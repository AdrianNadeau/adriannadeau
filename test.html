

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio on Page Load</title>
</head>
<body>

<audio id="audioPlayer" controls>
    <source src="Converted by VirtualSpeech - dnougesx8f.mp3" type="audio/mp3">
    Your browser does not support the audio element.
</audio>

<script>
    // Function to play audio when the page loads
    function playAudioOnLoad() {
        var audioPlayer = document.getElementById('audioPlayer');
        audioPlayer.play();
    }

    // Attach the function to the 'onload' event of the body element
    window.onload = playAudioOnLoad;
</script>

</body>
</html>

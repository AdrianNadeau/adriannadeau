<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
  <title>Sliding Bootstrap Element</title>
  <style>
    /* Custom styles for the sliding element */
    #slidingElement {
      position: fixed;
      top: 0;
      right: -300px; /* Initially hide off-screen */
      width: 300px;
      height: 100%;
      background-color: #f8f9fa;
      padding: 20px;
      transition: right 10s ease-in-out;
    }
  </style>
</head>
<body>

  <div id="slidingElement">
    <!-- Your content goes here -->
    <h4>Sliding Element</h4>
    <p>This is a sliding Bootstrap element.</p>
  </div>

  <!-- Bootstrap navigation button to trigger the slide -->
  <button id="toggleButton" class="btn btn-primary">Toggle Slide</button>

  <!-- Bootstrap and jQuery scripts -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

  <script>
    // jQuery script to handle the sliding effect
    $(document).ready(function(){
      // Toggle button click event
      $("#toggleButton").click(function(){
        // Toggle the sliding element by adjusting the 'right' property
        $("#slidingElement").toggleClass("open");
      });
    });
  </script>

</body>
</html>
